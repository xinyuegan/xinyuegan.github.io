<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fragments | Gan Xinyue</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;1,400&family=Inter:wght@300;400&display=swap" rel="stylesheet">
    
    <style>
        body { padding-bottom: 100px; }
        
        nav {
            position: relative;
            background: #fff;
        }

        .page-title { 
            font-size: 3rem; 
            margin: 40px 6vw 60px; 
            font-weight: 400; 
            border-bottom: 1px solid #000; 
            padding-bottom: 20px; 
        }

        .fragments-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 60px;
            padding: 0 6vw;
            max-width: 900px;
        }

        .fragment-card {
            display: block;
            text-align: center;
        }

        /* 修复2: Drawings 封面图片样式 */
        .fragment-image {
            width: 100%;
            aspect-ratio: 4/3;
            background: #eee;
            overflow: hidden;
            margin-bottom: 20px;
        }

        .fragment-image img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.5s ease;
        }

        .fragment-card:hover .fragment-image img {
            transform: scale(1.05);
        }

        .fragment-card h3 {
            font-size: 1.5rem;
            font-weight: 400;
            font-family: 'Playfair Display', serif;
            margin-bottom: 8px;
        }

        /* 修复2: Poems 灰色小字 */
        .fragment-subtitle {
            font-size: 0.95rem;
            color: #888;
            font-style: italic;
        }
    </style>
</head>
<body>

    <nav>
        <div class="logo"><a href="index.html">GAN XINYUE</a></div>
        <ul class="nav-links">
            <li><a href="index.html">Home</a></li>
            <li><a href="fragments.html" style="text-decoration:underline !important;">Fragments</a></li>
            <li><a href="index.html#about">About</a></li>
        </ul>
    </nav>

    <h1 class="page-title">Fragments</h1>

    <div class="fragments-grid">
        <!-- Drawings 带封面图片 -->
        <a href="fragments-drawings.html" class="fragment-card">
            <div class="fragment-image">
                <img src="assets/drawings-cover.jpg" alt="Drawings">
            </div>
            <h3>Drawings</h3>
        </a>
        
        <!-- Poems 带灰色小字 -->
        <a href="fragments-poems.html" class="fragment-card">
            <div class="fragment-image">
                <img src="assets/poems-cover.jpg" alt="Poems">
            </div>
            <h3>Poems</h3>
            <p class="fragment-subtitle">Dream, or Dawn</p>
        </a>
    </div>

</body>
</html>
