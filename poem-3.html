    <div class="poem-detail-container">
        <h1>Compassion</h1>
        <div class="poem-content">
            <p>
Buddha is a giant, tender tongue,<br>
On which all beings dwell and throng.<br>
Whenever one sheds tears, bitter and salt,<br>
Buddha knows it all.
            </p>
            <p>
Buddha and the weeping one<br>
Together taste the tang.
            </p>
