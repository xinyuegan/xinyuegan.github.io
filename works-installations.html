<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Installations | Gan Xinyue</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;1,400&family=Inter:wght@300;400&display=swap" rel="stylesheet">
    
    <style>
        body { padding-bottom: 100px; }
        
        nav {
            position: relative;
            background: #fff;
        }

        .page-title { 
            font-size: 3rem; 
            margin: 40px 6vw 60px; 
            font-weight: 400; 
            border-bottom: 1px solid #000; 
            padding-bottom: 20px; 
        }

        .works-grid {
            padding: 0 6vw;
        }

        .img-box {
            width: 100%;
            aspect-ratio: 16/9;
            background: #f0f0f0;
            overflow: hidden;
            margin-bottom: 15px;
        }

        .img-box img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
            transition: transform 0.5s ease;
        }

        .work-item:hover .img-box img {
            transform: scale(1.05);
        }

        .info h3 { font-size: 1.2rem; font-weight: 400; margin-bottom: 5px; }
        .info p { font-size: 0.85rem; color: #666; }
        .tag { 
            font-size: 0.7rem; 
            color: #999; 
            text-transform: uppercase; 
            letter-spacing: 1px; 
            display: block; 
            margin-bottom: 5px; 
        }
    </style>
</head>
<body>

    <nav>
        <div class="logo"><a href="index.html">GAN XINYUE</a></div>
        <ul class="nav-links">
            <li><a href="index.html">Home</a></li>
            <li><a href="works-films.html">Moving Image</a></li>
            <li><a href="works-installations.html" style="text-decoration:underline !important;">Installations</a></li>
            <li><a href="works-performances.html">Performances</a></li>
        </ul>
    </nav>

    <h1 class="page-title">Installations</h1>

    <div class="works-grid">
        
        <!-- 作品 1 -->
        <a href="project-bridge.html" class="work-item">
            <div class="img-box">
                <img src="assets/install-stage.jpg" alt="Stage">
            </div>
            <div class="info">
                <span class="tag">Stage Installation</span>
                <h3>The Black Tree Bridge</h3>
                <p>2023</p>
            </div>
        </a>

        <!-- 作品 2 -->
        <a href="project-detail.html" class="work-item">
            <div class="img-box">
                <img src="assets/install-film.jpg" alt="Film Install">
            </div>
            <div class="info">
                <span class="tag">Film Installation</span>
                <h3>The Day the Words Escaped</h3>
                <p>2024</p>
            </div>
        </a>

        <!-- 作品 3 -->
        <a href="project-studio.html" class="work-item">
            <div class="img-box">
                <img src="assets/install-sculpture.jpg" alt="Sculpture">

            <div class="info">
                <span class="tag">Sculpture</span>
                <h3>The Ideal Artist's Studio</h3>

        <a href="project-riverbed.html" class="work-item">

            </div>
