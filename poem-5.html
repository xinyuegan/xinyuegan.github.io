    <div class="poem-detail-container">
        <h1>Structure</h1>
        <div class="poem-content">
            <p>
Let us raise a vast house—<br>
each soul its timber, nail, and tile.<br>
We become beams, thresholds, spines of roofs…<br>
Till the structure stands complete,<br>
then we all shut our eyes,<br>
letting the wind reside<br>
in our very frames.
            </p>
